<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GeoEdu PRONOEI — Recuperar contraseña</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#1A3A5C 0%,#2E7D9E 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:white; border-radius:16px; padding:40px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
    .logo { text-align:center; margin-bottom:24px; }
    .logo h1 { font-size:24px; font-weight:700; color:#1A3A5C; }
    .logo p  { font-size:13px; color:#888; margin-top:4px; }
    .desc { font-size:13px; color:#666; line-height:1.6; margin-bottom:20px; text-align:center; }
    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:13px; font-weight:500; color:#444; margin-bottom:6px; }
    .form-group input { width:100%; padding:11px 14px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; outline:none; transition:border 0.2s; }
    .form-group input:focus { border-color:#1A3A5C; }
    .btn { width:100%; padding:12px; background:#1A3A5C; color:white; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; transition:background 0.2s; }
    .btn:hover { background:#254f7a; }
    .btn:disabled { background:#aaa; cursor:not-allowed; }
    .link-back { text-align:center; margin-top:16px; font-size:13px; }
    .link-back a { color:#1A3A5C; text-decoration:none; }
    .link-back a:hover { text-decoration:underline; }
    .msg { padding:10px 14px; border-radius:6px; font-size:13px; margin-bottom:14px; display:none; }
    .msg.error   { background:#fdecea; color:#c62828; border:1px solid #ffcdd2; }
    .msg.success { background:#e8f5e9; color:#2e7d32; border:1px solid #c8e6c9; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🔑 GeoEdu PRONOEI</h1>
    <p>Recuperar contraseña</p>
  </div>
  <p class="desc">
    Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
  </p>

  <div class="msg" id="msg"></div>

  <div class="form-group">
    <label>Correo electrónico</label>
    <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email"/>
  </div>

  <button class="btn" id="btnRecover" onclick="recover()">Enviar enlace</button>

  <div class="link-back">
    <a href="login.html">← Volver al inicio de sesión</a>
  </div>
</div>

<script>
  const API = "https://geoedu-pronoei-api.onrender.com";

  async function recover() {
    const email = document.getElementById("email").value.trim();
    const btn   = document.getElementById("btnRecover");

    if (!email) { showMsg("Ingresa tu correo electrónico.", "error"); return; }

    btn.disabled    = true;
    btn.textContent = "Enviando...";

    try {
      const res  = await fetch(`${API}/api/auth/recover`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      showMsg("✅ " + data.mensaje, "success");
    } catch(e) {
      showMsg("Error de conexión.", "error");
    } finally {
      btn.disabled    = false;
      btn.textContent = "Enviar enlace";
    }
  }

  function showMsg(texto, tipo) {
    const msg = document.getElementById("msg");
    msg.textContent   = texto;
    msg.className     = `msg ${tipo}`;
    msg.style.display = "block";
  }
</script>
</body>
</html>
