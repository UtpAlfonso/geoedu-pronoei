<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GeoEdu PRONOEI — Nueva contraseña</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Segoe UI',sans-serif;
      background:linear-gradient(135deg,#1A3A5C 0%,#2E7D9E 100%);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .card {
      background:white;
      border-radius:16px;
      padding:40px;
      width:100%;
      max-width:420px;
      box-shadow:0 20px 60px rgba(0,0,0,0.2);
    }
    .logo { text-align:center; margin-bottom:28px; }
    .logo h1 { font-size:24px; font-weight:700; color:#1A3A5C; }
    .logo p  { font-size:13px; color:#888; margin-top:4px; }
    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:13px; font-weight:500; color:#444; margin-bottom:6px; }
    .form-group input {
      width:100%; padding:11px 14px;
      border:1.5px solid #ddd; border-radius:8px;
      font-size:14px; outline:none; transition:border 0.2s;
    }
    .form-group input:focus { border-color:#1A3A5C; }
    .btn {
      width:100%; padding:12px;
      background:#1A3A5C; color:white;
      border:none; border-radius:8px;
      font-size:15px; font-weight:600;
      cursor:pointer; margin-top:6px;
      transition:background 0.2s;
    }
    .btn:hover { background:#254f7a; }
    .btn:disabled { background:#aaa; cursor:not-allowed; }
    .msg {
      padding:10px 14px; border-radius:6px;
      font-size:13px; margin-bottom:14px;
      display:none;
    }
    .msg.error   { background:#fdecea; color:#c62828; border:1px solid #ffcdd2; }
    .msg.success { background:#e8f5e9; color:#2e7d32; border:1px solid #c8e6c9; }
    .msg.warning { background:#fff3e0; color:#e65100; border:1px solid #ffe0b2; }
    .link-back { text-align:center; margin-top:16px; font-size:13px; }
    .link-back a { color:#1A3A5C; text-decoration:none; }
    .link-back a:hover { text-decoration:underline; }
    .token-debug { font-size:11px; color:#aaa; margin-top:8px; text-align:center; word-break:break-all; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🔒 GeoEdu PRONOEI</h1>
    <p>Crear nueva contraseña</p>
  </div>

  <div class="msg" id="msg"></div>

  <div id="formSection">
    <div class="form-group">
      <label>Nueva contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password"/>
    </div>
    <div class="form-group">
      <label>Confirmar contraseña</label>
      <input type="password" id="password2" placeholder="Repite tu nueva contraseña" autocomplete="new-password"/>
    </div>
    <button class="btn" id="btnReset" onclick="resetPassword()">
      Guardar nueva contraseña
    </button>
  </div>

  <div class="link-back">
    <a href="login.html">← Volver al inicio de sesión</a>
  </div>
</div>

<script>
  const API = "https://geoedu-pronoei-api.onrender.com";

  // Leer el token de la URL
  const params = new URLSearchParams(window.location.search);
  const token  = params.get("token");

  console.log("URL completa:", window.location.href);
  console.log("Token detectado:", token);

  // Verificar que hay token
  if (!token || token.trim() === "") {
    showMsg(
      "⚠️ No se encontró el token de recuperación. " +
      "Asegúrate de abrir el enlace completo que llegó a tu correo.",
      "warning"
    );
    document.getElementById("btnReset").disabled = true;
  }

  async function resetPassword() {
    const password  = document.getElementById("password").value;
    const password2 = document.getElementById("password2").value;
    const btn       = document.getElementById("btnReset");

    // Validaciones
    if (!password || password.length < 8) {
      showMsg("La contraseña debe tener al menos 8 caracteres.", "error");
      return;
    }
    if (password !== password2) {
      showMsg("Las contraseñas no coinciden.", "error");
      return;
    }
    if (!token) {
      showMsg("Token inválido. Solicita un nuevo enlace de recuperación.", "error");
      return;
    }

    btn.disabled    = true;
    btn.textContent = "Guardando...";

    try {
      const res = await fetch(`${API}/api/auth/reset-password`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ token: token, new_password: password })
      });

      const data = await res.json();
      console.log("Respuesta reset:", res.status, data);

      if (!res.ok) {
        showMsg(data.detail || "Error al restablecer la contraseña.", "error");
        btn.disabled    = false;
        btn.textContent = "Guardar nueva contraseña";
        return;
      }

      // Éxito
      document.getElementById("formSection").style.display = "none";
      showMsg(
        "✅ Contraseña actualizada correctamente. Redirigiendo al login...",
        "success"
      );
      setTimeout(() => window.location.href = "login.html", 2500);

    } catch(e) {
      console.error("Error reset:", e);
      showMsg("Error de conexión con la API. Intenta de nuevo.", "error");
      btn.disabled    = false;
      btn.textContent = "Guardar nueva contraseña";
    }
  }

  function showMsg(texto, tipo) {
    const msg         = document.getElementById("msg");
    msg.textContent   = texto;
    msg.className     = `msg ${tipo}`;
    msg.style.display = "block";
  }

  // Enter para enviar
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") resetPassword();
  });
</script>
</body>
</html>
